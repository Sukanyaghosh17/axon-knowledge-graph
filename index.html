<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Axon — A smart notes system with version control and a knowledge graph. Where ideas flow." />
    <meta name="theme-color" content="#5E81AC" />
    <title>Axon — Where Ideas Flow</title>

    <!--
      Anti-flicker theme script.
      Runs synchronously BEFORE React mounts to apply the saved theme
      with zero flash between page loads.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('axon-theme');
          var preferred = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', preferred);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
